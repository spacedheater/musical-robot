name: Build Universal ImageMagick for macOS

# Trigger manually: Actions tab → Build Universal ImageMagick → Run workflow
on:
  workflow_dispatch:

jobs:
  build-universal:
    # ARM64 runner — can also build x86_64 via Rosetta, so no Intel runner needed
    runs-on: macos-latest

    steps:
      - name: Install ARM64 ImageMagick (native Homebrew)
        run: brew install imagemagick

      - name: Install x86_64 Homebrew + ImageMagick (via Rosetta)
        run: |
          # Intel Homebrew installs to /usr/local; ARM is at /opt/homebrew
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              < /dev/null
          fi
          arch -x86_64 /usr/local/bin/brew install imagemagick

      - name: Create universal binaries with lipo
        run: |
          ARM=/opt/homebrew/opt/imagemagick
          X86=/usr/local/opt/imagemagick

          mkdir -p universal/bin \
                   universal/lib/ImageMagick/modules-Q16HDRI/coders \
                   universal/lib/ImageMagick/modules-Q16HDRI/filters \
                   universal/lib/ImageMagick/config-Q16HDRI \
                   universal/etc/ImageMagick-7 \
                   universal/share/ImageMagick-7

          echo "ARM prefix: $ARM"
          echo "x86 prefix: $X86"

          # magick binary
          lipo -create "$ARM/bin/magick" "$X86/bin/magick" -output universal/bin/magick
          lipo -info universal/bin/magick

          # Main dylibs — discover version numbers dynamically in case they differ
          for arm_lib in "$ARM"/lib/libMagick*.dylib; do
            name=$(basename "$arm_lib")
            # Skip the short unversioned stubs (< 100 bytes)
            size=$(stat -f%z "$arm_lib" 2>/dev/null || stat -c%s "$arm_lib")
            [ "$size" -lt 100 ] && continue
            x86_lib="$X86/lib/$name"
            if [ -f "$x86_lib" ]; then
              lipo -create "$arm_lib" "$x86_lib" -output "universal/lib/$name"
              echo "Combined $name"
            else
              echo "WARNING: no x86 $name — copying ARM only"
              cp "$arm_lib" "universal/lib/$name"
            fi
          done

          # Codec .so plugins
          for arm_so in "$ARM"/lib/ImageMagick/modules-Q16HDRI/coders/*.so; do
            name=$(basename "$arm_so")
            x86_so="$X86/lib/ImageMagick/modules-Q16HDRI/coders/$name"
            if [ -f "$x86_so" ]; then
              lipo -create "$arm_so" "$x86_so" \
                   -output "universal/lib/ImageMagick/modules-Q16HDRI/coders/$name"
            else
              cp "$arm_so" "universal/lib/ImageMagick/modules-Q16HDRI/coders/$name"
            fi
          done

          # Filter .so plugins
          for arm_so in "$ARM"/lib/ImageMagick/modules-Q16HDRI/filters/*.so; do
            [ -f "$arm_so" ] || continue
            name=$(basename "$arm_so")
            x86_so="$X86/lib/ImageMagick/modules-Q16HDRI/filters/$name"
            if [ -f "$x86_so" ]; then
              lipo -create "$arm_so" "$x86_so" \
                   -output "universal/lib/ImageMagick/modules-Q16HDRI/filters/$name"
            else
              cp "$arm_so" "universal/lib/ImageMagick/modules-Q16HDRI/filters/$name"
            fi
          done

          # Config + locale (ARM version; content is the same on both)
          cp "$ARM/lib/ImageMagick/config-Q16HDRI/configure.xml" \
             universal/lib/ImageMagick/config-Q16HDRI/ 2>/dev/null || true
          cp "$ARM/etc/ImageMagick-7/"*.xml universal/etc/ImageMagick-7/
          cp /opt/homebrew/share/ImageMagick-7/english.xml universal/share/ImageMagick-7/ 2>/dev/null || true
          cp /opt/homebrew/share/ImageMagick-7/locale.xml  universal/share/ImageMagick-7/ 2>/dev/null || true

      - name: Fix dylib load paths (remove Homebrew prefix dependency)
        run: |
          MAGICK=universal/bin/magick
          LIBDIR=universal/lib

          # Fix each dylib: set its own install name and fix what magick loads
          for lib in "$LIBDIR"/libMagick*.dylib; do
            name=$(basename "$lib")
            # Set the dylib's own install name to be relative
            install_name_tool -id "@loader_path/$name" "$lib"
            # Fix the reference inside magick (both Homebrew prefixes)
            for prefix in /opt/homebrew /usr/local; do
              install_name_tool -change "$prefix/lib/$name" \
                "@loader_path/../lib/$name" "$MAGICK" 2>/dev/null || true
            done
          done

          # Fix cross-references between dylibs (e.g. libMagickWand → libMagickCore)
          for dep in "$LIBDIR"/libMagick*.dylib; do
            dep_name=$(basename "$dep")
            for consumer in "$LIBDIR"/libMagick*.dylib; do
              [ "$dep" = "$consumer" ] && continue
              for prefix in /opt/homebrew /usr/local; do
                install_name_tool -change "$prefix/lib/$dep_name" \
                  "@loader_path/$dep_name" "$consumer" 2>/dev/null || true
              done
            done
          done

          echo "=== Final load commands for magick ==="
          otool -L "$MAGICK"
          echo ""
          echo "=== Check for remaining Homebrew paths (should be empty) ==="
          otool -L "$MAGICK" | grep -E '/opt/homebrew|/usr/local' && \
            echo "WARNING: Homebrew paths still present" || echo "OK: no Homebrew paths"

      - name: Package
        run: |
          tar -czf imagemagick-universal-macos.tar.gz universal/
          echo "Archive size: $(du -sh imagemagick-universal-macos.tar.gz | cut -f1)"
          echo "Contents:"
          tar -tzf imagemagick-universal-macos.tar.gz | grep -v '/$' | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagemagick-universal-macos
          path: imagemagick-universal-macos.tar.gz
          retention-days: 30
