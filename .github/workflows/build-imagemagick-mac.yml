name: Build Universal ImageMagick for macOSv5

# Trigger manually: Actions tab → Build Universal ImageMagick for macOS → Run workflow
on:
  workflow_dispatch:

jobs:
  build-universal:
    # arm64 runner — builds arm64 natively, x86_64 via Rosetta (no Intel runner needed)
    runs-on: macos-15-arm64

    steps:
      - name: Install arm64 ImageMagick (native Homebrew)
        run: |
          set -euo pipefail
          brew install imagemagick

      - name: Install x86_64 ImageMagick (Intel Homebrew via Rosetta)
        run: |
          set -euo pipefail

          # Intel Homebrew lives at /usr/local; arm64 Homebrew is at /opt/homebrew
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              < /dev/null
          fi

          arch -x86_64 /usr/local/bin/brew install imagemagick

      - name: Collect and merge with lipo
        run: |
          set -euo pipefail

          ARM=$(brew --prefix imagemagick)
          X86=$(/usr/local/bin/brew --prefix imagemagick)

          echo "arm64 prefix: $ARM"
          echo "x86_64 prefix: $X86"
          file "$ARM/bin/magick"
          file "$X86/bin/magick"

          rm -rf uni
          mkdir -p uni/bin \
                   uni/lib/ImageMagick/modules-Q16HDRI/coders \
                   uni/lib/ImageMagick/modules-Q16HDRI/filters \
                   uni/etc/ImageMagick-7

          # ── magick binary ────────────────────────────────────────────────
          lipo -create "$ARM/bin/magick" "$X86/bin/magick" -output uni/bin/magick
          chmod +x uni/bin/magick
          echo "magick: $(lipo -archs uni/bin/magick)"

          # ── libMagick*.dylib ─────────────────────────────────────────────
          # Homebrew records these as Cellar paths in binaries, not always opt/ paths,
          # so collect them explicitly from each architecture's ImageMagick prefix.
          for arm_lib in "$ARM/lib/"libMagick*.dylib; do
            [ -f "$arm_lib" ] || continue
            [ "$(stat -f%z "$arm_lib")" -lt 100 ] && continue

            name=$(basename "$arm_lib")
            x86_lib="$X86/lib/$name"

            if [ -f "$x86_lib" ] && [ "$(stat -f%z "$x86_lib")" -gt 100 ]; then
              lipo -create "$arm_lib" "$x86_lib" -output "uni/lib/$name"
              echo "universal ImageMagick dylib: $name"
            else
              echo "ERROR: missing x86_64 match for $name at $x86_lib" >&2
              exit 1
            fi
          done

          # ── .so plugins ──────────────────────────────────────────────────
          # For a universal package, missing x86_64 modules should fail loudly.
          for arm_so in "$ARM/lib/ImageMagick/modules-Q16HDRI/coders/"*.so; do
            [ -f "$arm_so" ] || continue
            name=$(basename "$arm_so")
            x86_so="$X86/lib/ImageMagick/modules-Q16HDRI/coders/$name"

            if [ -f "$x86_so" ]; then
              lipo -create "$arm_so" "$x86_so" \
                -output "uni/lib/ImageMagick/modules-Q16HDRI/coders/$name"
              echo "universal coder: $name"
            else
              echo "ERROR: missing x86_64 coder module $name at $x86_so" >&2
              exit 1
            fi
          done

          for arm_so in "$ARM/lib/ImageMagick/modules-Q16HDRI/filters/"*.so; do
            [ -f "$arm_so" ] || continue
            name=$(basename "$arm_so")
            x86_so="$X86/lib/ImageMagick/modules-Q16HDRI/filters/$name"

            if [ -f "$x86_so" ]; then
              lipo -create "$arm_so" "$x86_so" \
                -output "uni/lib/ImageMagick/modules-Q16HDRI/filters/$name"
              echo "universal filter: $name"
            else
              echo "ERROR: missing x86_64 filter module $name at $x86_so" >&2
              exit 1
            fi
          done

          cp "$ARM/etc/ImageMagick-7/"*.xml uni/etc/ImageMagick-7/

          # Do not copy Homebrew .la module metadata.
          # Those files contain absolute Cellar libdir values and can make a
          # supposedly portable package load modules from /opt/homebrew or
          # /usr/local on the build machine. We rely on the .so modules plus
          # MAGICK_CODER_MODULE_PATH / MAGICK_FILTER_MODULE_PATH instead.
          echo "--- Creating compatibility module-layout symlinks ---"
          IM_VERSION=$("$ARM/bin/magick" --version | awk '/^Version:/{print $3; exit}')
          IM_SHORT_VERSION="${IM_VERSION%-*}"
          for imdir in "ImageMagick-7" "ImageMagick-$IM_SHORT_VERSION" "ImageMagick-$IM_VERSION"; do
            mkdir -p "uni/lib/$imdir"
            rm -rf "uni/lib/$imdir/modules-Q16HDRI"
            ln -s "../ImageMagick/modules-Q16HDRI" "uni/lib/$imdir/modules-Q16HDRI"
            echo "  module alias: uni/lib/$imdir/modules-Q16HDRI -> ../ImageMagick/modules-Q16HDRI"
          done

          # ── Collect ALL Homebrew dylibs transitively ─────────────────────
          # Scan magick + every bundled dylib/module for non-system Homebrew deps,
          # lipo-merge arm64+x86_64 copies into uni/lib, and repeat until stable.
          echo "--- Collecting transitive Homebrew dylibs ---"
          while true; do
            found=0

            for src in uni/bin/magick \
                       uni/lib/*.dylib \
                       uni/lib/ImageMagick/modules-Q16HDRI/coders/*.so \
                       uni/lib/ImageMagick/modules-Q16HDRI/filters/*.so; do
              [ -f "$src" ] || continue

              while IFS= read -r recorded; do
                name=$(basename "$recorded")
                [ -f "uni/lib/$name" ] && continue

                # Translate between ARM (/opt/homebrew/) and Intel (/usr/local/) prefixes.
                # Use prefix stripping instead of Bash replacement with escaped slashes;
                # the prior form produced literal \/opt\/homebrew paths on macOS bash.
                if [[ "$recorded" == /usr/local/* ]]; then
                  arm_path="/opt/homebrew/${recorded#/usr/local/}"
                  x86_path="$recorded"
                elif [[ "$recorded" == /opt/homebrew/* ]]; then
                  arm_path="$recorded"
                  x86_path="/usr/local/${recorded#/opt/homebrew/}"
                else
                  continue
                fi

                if [ -f "$arm_path" ] && [ -f "$x86_path" ] && [ "$arm_path" != "$x86_path" ]; then
                  lipo -create "$arm_path" "$x86_path" -output "uni/lib/$name"
                  echo "  universal dep: $name"
                  found=1
                elif [ -f "$arm_path" ]; then
                  echo "ERROR: missing x86_64 dependency for $name" >&2
                  echo "  recorded: $recorded" >&2
                  echo "  arm_path: $arm_path" >&2
                  echo "  x86_path: $x86_path" >&2
                  exit 1
                elif [ -f "$x86_path" ]; then
                  echo "ERROR: missing arm64 dependency for $name" >&2
                  echo "  recorded: $recorded" >&2
                  echo "  arm_path: $arm_path" >&2
                  echo "  x86_path: $x86_path" >&2
                  exit 1
                else
                  echo "WARN: dependency path was recorded but neither translated path exists: $recorded" >&2
                fi
              done < <(otool -L "$src" | awk 'NR>1{print $1}' \
                       | grep -E '^(/opt/homebrew|/usr/local)' \
                       | grep -v '^/usr/lib' || true)
            done

            [ "$found" -eq 0 ] && break
          done

          echo "--- Dylib collection complete ---"
          ls -lh uni/lib/*.dylib

      - name: Fix dylib load paths
        run: |
          set -euo pipefail

          MAGICK=uni/bin/magick
          LIBDIR=uni/lib
          CODERS="$LIBDIR/ImageMagick/modules-Q16HDRI/coders"
          FILTERS="$LIBDIR/ImageMagick/modules-Q16HDRI/filters"

          # lipo output from Homebrew bottles can be read-only (-r--r--r--).
          # install_name_tool needs write permission and may otherwise exit 1
          # without a useful GitHub Actions log line.
          chmod -R u+w uni

          change_dep() {
            local target="$1"
            local old="$2"
            local new="$3"
            local label="$4"

            if install_name_tool -change "$old" "$new" "$target"; then
              echo "$label changed: $old -> $new"
              return 0
            fi

            # Fat binaries can expose both arm64 and x86_64 original paths.
            # If a prior install_name_tool call already removed this exact old
            # path from all slices, do not fail the build on a stale queued item.
            if ! otool -L "$target" | awk 'NR>1{print $1}' | grep -Fxq "$old"; then
              echo "$label already changed or absent: $old"
              return 0
            fi

            echo "ERROR: install_name_tool failed for $target" >&2
            echo "  old: $old" >&2
            echo "  new: $new" >&2
            echo "  current load paths:" >&2
            otool -L "$target" >&2 || true
            return 1
          }

          # 1. magick binary → bundled dylibs: @loader_path/../lib/<name>
          deps=$(mktemp)
          otool -L "$MAGICK" | awk 'NR>1{print $1}'             | grep -E '^(/opt/homebrew|/usr/local)'             | grep -v '^/usr/lib' > "$deps" || true

          while IFS= read -r recorded; do
            [ -n "$recorded" ] || continue
            name=$(basename "$recorded")
            [ -f "$LIBDIR/$name" ] || continue
            change_dep "$MAGICK" "$recorded" "@loader_path/../lib/$name" "magick"
          done < "$deps"
          rm -f "$deps"

          # 2. Each bundled dylib: set its own install name + fix deps to siblings.
          for lib in "$LIBDIR"/*.dylib; do
            [ -f "$lib" ] || continue
            name=$(basename "$lib")
            echo "Patching dylib: $name"
            install_name_tool -id "@loader_path/$name" "$lib"

            deps=$(mktemp)
            otool -L "$lib" | awk 'NR>1{print $1}'               | grep -E '^(/opt/homebrew|/usr/local)'               | grep -v '^/usr/lib' > "$deps" || true

            while IFS= read -r recorded; do
              [ -n "$recorded" ] || continue
              dname=$(basename "$recorded")
              [ "$dname" = "$name" ] && continue
              [ -f "$LIBDIR/$dname" ] || continue
              change_dep "$lib" "$recorded" "@loader_path/$dname" "$name"
            done < "$deps"
            rm -f "$deps"
          done

          # 3. .so modules → bundled dylibs: @executable_path/../lib/<name>
          # At runtime, @executable_path is uni/bin, so ../lib resolves to uni/lib.
          for so in "$CODERS"/*.so "$FILTERS"/*.so; do
            [ -f "$so" ] || continue
            so_name=$(basename "$so")
            echo "Patching module: $so_name"

            deps=$(mktemp)
            otool -L "$so" | awk 'NR>1{print $1}'               | grep -E '^(/opt/homebrew|/usr/local)'               | grep -v '^/usr/lib' > "$deps" || true

            while IFS= read -r recorded; do
              [ -n "$recorded" ] || continue
              dname=$(basename "$recorded")
              [ -f "$LIBDIR/$dname" ] || continue
              change_dep "$so" "$recorded" "@executable_path/../lib/$dname" "$so_name"
            done < "$deps"
            rm -f "$deps"
          done

      - name: Verify universal binaries and load paths
        run: |
          set -euo pipefail

          echo "=== Verify every bundled Mach-O is universal ==="
          for f in uni/bin/magick \
                   uni/lib/*.dylib \
                   uni/lib/ImageMagick/modules-Q16HDRI/coders/*.so \
                   uni/lib/ImageMagick/modules-Q16HDRI/filters/*.so; do
            [ -f "$f" ] || continue
            archs=$(lipo -archs "$f" 2>/dev/null || true)
            echo "$f: $archs"
            echo "$archs" | grep -q 'arm64' || { echo "FAIL: $f missing arm64" >&2; exit 1; }
            echo "$archs" | grep -q 'x86_64' || { echo "FAIL: $f missing x86_64" >&2; exit 1; }
          done

          echo ""
          echo "=== Final load commands for magick ==="
          otool -L uni/bin/magick

          echo ""
          echo "=== Checking for remaining Homebrew absolute paths everywhere ==="
          bad=0
          for f in uni/bin/magick \
                   uni/lib/*.dylib \
                   uni/lib/ImageMagick/modules-Q16HDRI/coders/*.so \
                   uni/lib/ImageMagick/modules-Q16HDRI/filters/*.so; do
            [ -f "$f" ] || continue
            leftovers=$(otool -L "$f" | awk 'NR>1{print $1}' \
              | grep -E '^(/opt/homebrew|/usr/local)' \
              | grep -v '^/usr/lib' || true)

            if [ -n "$leftovers" ]; then
              echo "FAIL: machine-specific paths still present in $f:"
              echo "$leftovers"
              bad=1
            fi
          done

          [ "$bad" -eq 0 ] || exit 1

          echo ""
          echo "=== Checking portable metadata ==="
          if find uni -type f -name '*.la' | grep -q .; then
            echo "FAIL: .la module metadata should not be packaged because it contains build-machine paths" >&2
            find uni -type f -name '*.la' >&2
            exit 1
          fi

          text_leftovers=$(find uni -type f \( -name '*.xml' -o -name '*.la' -o -name '*.pc' -o -name '*.txt' \) -print0 |
            xargs -0 grep -nE '/opt/homebrew|/usr/local' 2>/dev/null || true)
          if [ -n "$text_leftovers" ]; then
            echo "FAIL: text metadata still contains machine-specific Homebrew paths:" >&2
            echo "$text_leftovers" >&2
            exit 1
          fi

          echo "OK: no machine-specific Homebrew paths anywhere"

      - name: Ad-hoc sign all Mach-O files
        # install_name_tool invalidates existing signatures. Sign every binary,
        # dylib, and ImageMagick module after all Mach-O edits are complete.
        run: |
          set -euo pipefail

          find uni -type f \( -name 'magick' -o -name '*.dylib' -o -name '*.so' \) -print0 |
            while IFS= read -r -d '' f; do
              echo "Signing $f"
              codesign --force --sign - "$f"
            done

          echo ""
          echo "=== Verify signatures ==="
          find uni -type f \( -name 'magick' -o -name '*.dylib' -o -name '*.so' \) -print0 |
            while IFS= read -r -d '' f; do
              codesign --verify --verbose=2 "$f"
            done

          echo ""
          codesign -dv uni/bin/magick 2>&1 | head -4

      - name: Smoke test arm64
        run: |
          set -euo pipefail

          export MAGICK_HOME="$(pwd)/uni"
          export MAGICK_CONFIGURE_PATH="$(pwd)/uni/etc/ImageMagick-7"

          MODULE_ROOT="$(pwd)/uni/lib/ImageMagick/modules-Q16HDRI"
          export MAGICK_MODULE_PATH="$MODULE_ROOT"
          export MAGICK_CODER_MODULE_PATH="$MODULE_ROOT/coders"
          export MAGICK_FILTER_MODULE_PATH="$MODULE_ROOT/filters"

          # Intentionally do not set DYLD_LIBRARY_PATH. The patched install names
          # should make the package self-contained.
          uni/bin/magick --version
          echo ""
          echo "MAGICK_HOME=$MAGICK_HOME"
          echo "MAGICK_CONFIGURE_PATH=$MAGICK_CONFIGURE_PATH"
          echo "MAGICK_CODER_MODULE_PATH=$MAGICK_CODER_MODULE_PATH"
          echo ""

          uni/bin/magick -list module | tee /tmp/im_modules_arm64.txt
          test -s /tmp/im_modules_arm64.txt || {
            echo "ERROR: ImageMagick did not list any modules" >&2
            exit 1
          }

          uni/bin/magick -list format | tee /tmp/im_formats_arm64.txt >/dev/null
          for fmt in XC PNG JPEG TIFF WEBP; do
            grep -E "^[[:space:]]*$fmt\\*?[[:space:]]" /tmp/im_formats_arm64.txt || {
              echo "ERROR: expected format $fmt is not registered" >&2
              echo "Nearby format lines:" >&2
              grep -Ei "^[[:space:]]*($fmt|JPG|JPE|TIF|WEBP|XC)" /tmp/im_formats_arm64.txt >&2 || true
              exit 1
            }
          done

          uni/bin/magick -size 200x200 xc:white \
            -stroke red -strokewidth 3 -fill none \
            -draw "rectangle 20,20 180,180" \
            /tmp/critiqly_smoke_arm64.png

          uni/bin/magick /tmp/critiqly_smoke_arm64.png -quality 88 /tmp/critiqly_smoke_arm64.jpg
          uni/bin/magick /tmp/critiqly_smoke_arm64.png /tmp/critiqly_smoke_arm64.tiff
          uni/bin/magick /tmp/critiqly_smoke_arm64.png /tmp/critiqly_smoke_arm64.webp

          for out in /tmp/critiqly_smoke_arm64.png /tmp/critiqly_smoke_arm64.jpg /tmp/critiqly_smoke_arm64.tiff /tmp/critiqly_smoke_arm64.webp; do
            test -s "$out" || { echo "ERROR: missing output $out" >&2; exit 1; }
            file "$out"
            uni/bin/magick identify "$out"
          done

          echo "Smoke test arm64: PASSED"

      - name: Smoke test x86_64 under Rosetta
        run: |
          set -euo pipefail

          export MAGICK_HOME="$(pwd)/uni"
          export MAGICK_CONFIGURE_PATH="$(pwd)/uni/etc/ImageMagick-7"

          MODULE_ROOT="$(pwd)/uni/lib/ImageMagick/modules-Q16HDRI"
          export MAGICK_MODULE_PATH="$MODULE_ROOT"
          export MAGICK_CODER_MODULE_PATH="$MODULE_ROOT/coders"
          export MAGICK_FILTER_MODULE_PATH="$MODULE_ROOT/filters"

          arch -x86_64 uni/bin/magick --version
          echo ""
          echo "MAGICK_HOME=$MAGICK_HOME"
          echo "MAGICK_CONFIGURE_PATH=$MAGICK_CONFIGURE_PATH"
          echo "MAGICK_CODER_MODULE_PATH=$MAGICK_CODER_MODULE_PATH"
          echo ""

          arch -x86_64 uni/bin/magick -list module | tee /tmp/im_modules_x86_64.txt
          test -s /tmp/im_modules_x86_64.txt || {
            echo "ERROR: ImageMagick did not list any modules under Rosetta" >&2
            exit 1
          }

          arch -x86_64 uni/bin/magick -list format | tee /tmp/im_formats_x86_64.txt >/dev/null
          for fmt in XC PNG JPEG TIFF WEBP; do
            grep -E "^[[:space:]]*$fmt\\*?[[:space:]]" /tmp/im_formats_x86_64.txt || {
              echo "ERROR: expected format $fmt is not registered under Rosetta" >&2
              echo "Nearby format lines:" >&2
              grep -Ei "^[[:space:]]*($fmt|JPG|JPE|TIF|WEBP|XC)" /tmp/im_formats_x86_64.txt >&2 || true
              exit 1
            }
          done

          arch -x86_64 uni/bin/magick -size 200x200 xc:white \
            -stroke red -strokewidth 3 -fill none \
            -draw "rectangle 20,20 180,180" \
            /tmp/critiqly_smoke_x86_64.png

          arch -x86_64 uni/bin/magick /tmp/critiqly_smoke_x86_64.png -quality 88 /tmp/critiqly_smoke_x86_64.jpg
          arch -x86_64 uni/bin/magick /tmp/critiqly_smoke_x86_64.png /tmp/critiqly_smoke_x86_64.tiff
          arch -x86_64 uni/bin/magick /tmp/critiqly_smoke_x86_64.png /tmp/critiqly_smoke_x86_64.webp

          for out in /tmp/critiqly_smoke_x86_64.png /tmp/critiqly_smoke_x86_64.jpg /tmp/critiqly_smoke_x86_64.tiff /tmp/critiqly_smoke_x86_64.webp; do
            test -s "$out" || { echo "ERROR: missing output $out" >&2; exit 1; }
            file "$out"
            arch -x86_64 uni/bin/magick identify "$out"
          done

          echo "Smoke test x86_64: PASSED"

      - name: Package
        run: |
          set -euo pipefail

          # Extracts directly into bin/mac/ in the plugin:
          #   tar -xzf imagemagick-universal-macos.tar.gz -C Critiqly.lrplugin/bin/mac/
          tar -czf imagemagick-universal-macos.tar.gz -C uni .

          echo "Archive: $(du -sh imagemagick-universal-macos.tar.gz | cut -f1)"
          echo "Architectures: $(lipo -archs uni/bin/magick)"
          echo ""
          echo "Contents:"
          tar -tzf imagemagick-universal-macos.tar.gz | grep -v '/$'

      - uses: actions/upload-artifact@v4
        with:
          name: imagemagick-universal-macos
          path: imagemagick-universal-macos.tar.gz
          retention-days: 30
